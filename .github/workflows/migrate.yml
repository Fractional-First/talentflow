name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - supabase/migrations/**

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no changes applied). Defaults to true for manual dispatch — set to false to actually apply."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets are set
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            missing=1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set"
            missing=1
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is not set"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: List migrations (local vs remote)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase migration list --linked

      - name: Dry-run db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run

      - name: Apply migrations
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase db push --linked

      - name: Summary
        if: always()
        run: |
          {
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "## Supabase DB Push (dry-run)"
              echo ""
              echo "Dry-run only. No migrations were applied."
            else
              echo "## Supabase DB Push"
              echo ""
              echo "Triggered by: \`${{ github.event_name }}\`"
            fi

            echo ""
            echo "## Release ordering"
            echo ""
            echo "Database migrations are serialized and applied from GitHub Actions."
            echo ""
            echo "To fully guarantee 'migration before deploy', production frontend deploy must be triggered after this job rather than independently by host-side auto-deploy."
          } >> "$GITHUB_STEP_SUMMARY"
