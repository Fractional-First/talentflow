name: Supabase DB Push

# Apply Supabase migrations to production whenever a PR that changes
# `supabase/migrations/**` is merged into `main`. Also exposes a manual
# trigger with an optional dry-run flag for safe inspection.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — production DB password for project
#                            dtyugokvlksnatftpucm

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-db-push.yml"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no changes applied)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: supabase-db-push
  cancel-in-progress: false

jobs:
  db-push:
    name: Push migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: dtyugokvlksnatftpucm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets are set
        run: |
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            missing=1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Project ref: $SUPABASE_PROJECT_ID"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: List pending migrations
        run: supabase migration list --linked

      - name: Dry-run db push
        run: supabase db push --linked --dry-run

      - name: Apply migrations
        if: ${{ inputs.dry_run != 'true' }}
        run: supabase db push --linked

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "## Supabase DB Push (dry-run)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Dry-run only. No migrations were applied." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Supabase DB Push" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Project: \`$SUPABASE_PROJECT_ID\`" >> "$GITHUB_STEP_SUMMARY"
            echo "Triggered by: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
