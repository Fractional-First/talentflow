name: Supabase DB Push

# Apply Supabase migrations to the production project whenever a commit
# landing on `main` touches `supabase/migrations/**`. Also exposes a manual
# `workflow_dispatch` trigger with an optional dry-run flag for inspection.
#
# The Supabase project ref is read from `supabase/config.toml` (`project_id`)
# at runtime, so the workflow tracks whatever the repo is linked to and there
# is no separate `SUPABASE_PROJECT_REF` secret to keep in sync.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — production DB password for the linked project

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-db-push.yml"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no changes applied)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: supabase-db-push
  cancel-in-progress: false

jobs:
  db-push:
    name: Push migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref from supabase/config.toml
        id: project
        run: |
          set -euo pipefail
          ref=$(awk -F' *= *' '$1=="project_id"{gsub(/"/,"",$2); print $2; exit}' supabase/config.toml)
          if [ -z "${ref:-}" ]; then
            echo "::error::Could not read project_id from supabase/config.toml"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Resolved Supabase project ref: $ref"

      - name: Verify required secrets are set
        run: |
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            missing=1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "${{ steps.project.outputs.ref }}"

      - name: List migrations (local vs remote)
        run: supabase migration list --linked

      - name: Dry-run db push
        run: supabase db push --linked --dry-run

      - name: Apply migrations
        if: ${{ inputs.dry_run != 'true' }}
        run: supabase db push --linked

      - name: Summary
        if: always()
        run: |
          {
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "## Supabase DB Push (dry-run)"
              echo ""
              echo "Dry-run only. No migrations were applied."
            else
              echo "## Supabase DB Push"
              echo ""
              echo "Project: \`${{ steps.project.outputs.ref }}\`"
              echo "Triggered by: \`${{ github.event_name }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
